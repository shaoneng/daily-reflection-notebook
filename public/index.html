<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#ffffff">
    <title>每日记录笔记本</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="date-line" id="todayLabel">今天</p>
          <h1>每日记录笔记本</h1>
        </div>
        <div class="top-actions">
          <span class="status-pill" id="syncStatus">未同步</span>
          <button class="icon-button" id="settingsButton" type="button" aria-label="设置访问口令" title="设置">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15.5A3.5 3.5 0 1 0 12 8a3.5 3.5 0 0 0 0 7.5Z"/><path d="M19.4 15a1.8 1.8 0 0 0 .36 1.98l.05.05a2.1 2.1 0 0 1-2.97 2.97l-.05-.05a1.8 1.8 0 0 0-1.98-.36 1.8 1.8 0 0 0-1.1 1.65v.16a2.1 2.1 0 1 1-4.2 0v-.08A1.8 1.8 0 0 0 8.4 19.6a1.8 1.8 0 0 0-1.98.36l-.05.05a2.1 2.1 0 0 1-2.97-2.97l.05-.05A1.8 1.8 0 0 0 3.8 15a1.8 1.8 0 0 0-1.65-1.1H2.1a2.1 2.1 0 1 1 0-4.2h.08A1.8 1.8 0 0 0 3.8 8.6a1.8 1.8 0 0 0-.36-1.98l-.05-.05A2.1 2.1 0 1 1 6.36 3.6l.05.05a1.8 1.8 0 0 0 1.98.36 1.8 1.8 0 0 0 1.1-1.65V2.1a2.1 2.1 0 1 1 4.2 0v.08a1.8 1.8 0 0 0 1.1 1.65 1.8 1.8 0 0 0 1.98-.36l.05-.05a2.1 2.1 0 1 1 2.97 2.97l-.05.05A1.8 1.8 0 0 0 19.4 8.6a1.8 1.8 0 0 0 1.65 1.1h.16a2.1 2.1 0 1 1 0 4.2h-.08A1.8 1.8 0 0 0 19.4 15Z"/></svg>
          </button>
        </div>
      </header>

      <main class="workspace">
        <aside class="activity-sidebar" aria-label="年度记录热力图">
          <section class="activity-panel">
            <div class="panel-heading">
              <div>
                <p class="section-label">年度热力图</p>
                <h2 id="activityYearLabel">今年</h2>
              </div>
              <div class="compact-actions">
                <button class="icon-button compact" id="prevYearButton" type="button" aria-label="上个月" title="上个月">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
                </button>
                <button class="icon-button compact" id="nextYearButton" type="button" aria-label="下个月" title="下个月">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="m9 18 6-6-6-6"/></svg>
                </button>
              </div>
            </div>
            <div class="activity-wrap monthly-activity" id="activityGrid" aria-label="年度记录热力图">
              <div class="empty-state">正在读取年度记录...</div>
            </div>
            <div class="activity-footer">
              <span id="activitySummary">正在读取年度记录...</span>
              <div class="activity-legend" aria-label="记录数量图例">
                <span>少</span><i data-level="0"></i><i data-level="1"></i><i data-level="2"></i><i data-level="3"></i><i data-level="4"></i><span>多</span>
              </div>
            </div>
          </section>
        </aside>

        <section class="record-workspace">
          <section class="input-panel">
            <div class="panel-heading">
              <div>
                <p class="section-label">记录输入</p>
                <h2 id="selectedDateLabel">今天</h2>
              </div>
            </div>
            <div class="input-grid">
              <article class="entry-card single-entry-card">
                <div class="entry-card-head">
                  <h3>写一条记录</h3>
                  <button class="primary-button save-entry-button" type="button">
                    <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg>
                    保存
                  </button>
                </div>
                <textarea class="entry-input" placeholder="直接写今天发生的事、动作、想法或下一步，支持 #标签。按 Command/Ctrl + Enter 保存。"></textarea>
              </article>
            </div>
          </section>

          <section class="day-panel">
            <div class="panel-heading">
              <div>
                <p class="section-label">今日记录</p>
                <h2 id="noteTitle">加载中</h2>
              </div>
              <a class="icon-link" id="exportLink" href="#" aria-label="导出 Markdown" title="导出">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/></svg>
              </a>
            </div>
            <div class="day-summary">
              <span id="entryCount">0 条记录</span>
              <span id="lastSavedAt">今天还没有开始</span>
            </div>
            <section class="review-card" aria-labelledby="reviewTitle">
              <div class="review-head">
                <h3 id="reviewTitle">AI 复盘</h3>
                <button class="primary-button" id="reviewButton" type="button">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3 9.7 8.2 4.5 10.5l5.2 2.3L12 18l2.3-5.2 5.2-2.3-5.2-2.3L12 3Z"/><path d="M19 16l-.8 1.8L16.5 18.5l1.7.7L19 21l.8-1.8 1.7-.7-1.7-.7L19 16Z"/></svg>
                  生成复盘
                </button>
              </div>
              <div class="review-output" id="reviewOutput">
                <p>还没有生成复盘。</p>
              </div>
            </section>
            <div class="timeline-list" id="timelineList">
              <div class="empty-state">正在读取记录...</div>
            </div>
            <details class="markdown-drawer">
              <summary>查看 Markdown 原文</summary>
              <pre class="markdown-view" id="markdownView">正在读取记录...</pre>
            </details>
          </section>
        </section>
      </main>
    </div>

    <dialog id="settingsDialog">
      <form method="dialog" class="dialog-body">
        <div class="panel-heading">
          <div>
            <p class="section-label">设置</p>
            <h2>访问口令</h2>
          </div>
          <button class="icon-button" value="cancel" type="submit" aria-label="关闭" title="关闭">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
          </button>
        </div>
        <label class="field-label" for="passwordInput">Cloudflare 环境变量 APP_PASSWORD</label>
        <input id="passwordInput" type="password" autocomplete="current-password" placeholder="输入访问口令">
        <button class="primary-button full-width" id="savePasswordButton" value="default" type="submit">保存口令</button>
      </form>
    </dialog>

    <script src="/app.js" type="module"></script>
  </body>
</html>
